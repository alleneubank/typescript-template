pre-commit:
  commands:
    typecheck:
      glob: '*.{ts,tsx}'
      run: nub run typecheck
    lint:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx}'
      run: nubx oxlint --fix {staged_files}
      stage_fixed: true
    format:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx,json,jsonc}'
      run: nubx oxfmt --write {staged_files}
      stage_fixed: true
    knip:
      glob: '*.{ts,tsx,json}'
      run: nub run knip
    jscpd:
      glob: '*.{ts,tsx}'
      run: nub run jscpd

pre-push:
  commands:
    typecheck:
      glob: '*.{ts,tsx}'
      run: nub run typecheck
    lint:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx}'
      run: nubx oxlint {push_files}
    format:
      glob: '*.{js,ts,cjs,mjs,jsx,tsx,json,jsonc}'
      run: nubx oxfmt --check {push_files}
    knip:
      glob: '*.{ts,tsx,json}'
      run: nub run knip
    jscpd:
      glob: '*.{ts,tsx}'
      run: nub run jscpd
